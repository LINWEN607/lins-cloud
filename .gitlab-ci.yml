# 流水线阶段
stages:
  - build      # 构建镜像并推送 GHCR
  - deploy     # SSH 部署，失败则回滚
  - notify     # 钉钉通知（独立，确保任何状态都触发）
  - cleanup    # 清理 GHCR 旧版本

image: docker:27

services:
  - name: docker:27-dind
    command: ["--registry-mirror", "https://docker.m.daocloud.io"]

variables:
  SLUG: "main"               # 分支标识，切换分支时改这一行
  IMAGE_PREFIX: ghcr.io/linwen607
  GHCR_USERNAME: LINWEN607
  SERVICES: "lins-server lins-agent"
  GIT_DEPTH: "50"

# 流水线触发条件：只有目标分支才运行
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $SLUG

# ====== 构建阶段 ======
build:
  stage: build
  before_script:
    - printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
  script:
    - |
      # 第一轮：构建全部服务
      for service in $SERVICES; do
        echo "========== 构建 ${service} =========="
        CACHE_FILE="/cache/docker-build/${SLUG}-${service}-buildcache.tar.gz"
        mkdir -p /cache/docker-build
        [ -f "$CACHE_FILE" ] && docker load -i "$CACHE_FILE" || true
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from "$IMAGE_PREFIX/${service}:${SLUG}-buildcache" \
          -t "$IMAGE_PREFIX/${service}:${SLUG}-$CI_COMMIT_SHORT_SHA" \
          -t "$IMAGE_PREFIX/${service}:${SLUG}-buildcache" \
          -f "${service}/Dockerfile" "${service}/"
      done

      # 第二轮：全部成功后推送 + 缓存 + 清理
      for service in $SERVICES; do
        echo "========== 推送 ${service} =========="
        docker push "$IMAGE_PREFIX/${service}:${SLUG}-$CI_COMMIT_SHORT_SHA"
        CACHE_FILE="/cache/docker-build/${SLUG}-${service}-buildcache.tar.gz"
        docker save "$IMAGE_PREFIX/${service}:${SLUG}-buildcache" | gzip > "$CACHE_FILE"
        docker rmi \
          "$IMAGE_PREFIX/${service}:${SLUG}-$CI_COMMIT_SHORT_SHA" \
          "$IMAGE_PREFIX/${service}:${SLUG}-buildcache" 2>/dev/null || true
      done

# ====== 部署阶段 ======
deploy:
  stage: deploy
  artifacts:
    when: always   # 失败也保留，供 notify 读取
    paths:
      - deploy-status.txt
      - failed-service.txt
      - succeeded-services.txt
      - skipped-services.txt
  script:
    - apk add --no-cache openssh-client sshpass curl jq
    - |
      set +e
      eval SSH_PASS=\$SSH_PASS_SERVER_${SLUG}
      eval SSH_HOST=\$SSH_HOST_SERVER_${SLUG}

      DEPLOY_STATUS="success"
      FAILED_SERVICE=""
      SUCCEEDED_SERVICES=""
      SKIPPED_SERVICES=""
      DEPLOYED_COUNT=0

      for service in $SERVICES; do
        echo "========== 部署 ${service} =========="

        RESULT=$(sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no "root@$SSH_HOST" "
          cd /data/linscloud/${service} &&
          COMPOSE_FILE=\$(ls docker-compose.yaml docker-compose.yml 2>/dev/null | head -1) &&
          if [ -z \"\$COMPOSE_FILE\" ]; then echo 'COMPOSE_NOT_FOUND'; exit 0; fi &&
          OLD_TAG=\$(grep 'image: $IMAGE_PREFIX/${service}:' \"\$COMPOSE_FILE\" | sed 's|.*$IMAGE_PREFIX/${service}:||') &&
          echo \"=== 当前版本: \${OLD_TAG}, 新版本: ${SLUG}-${CI_COMMIT_SHORT_SHA} ===\" &&
          printf '%s' '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin &&
          sed -i \"s|image: $IMAGE_PREFIX/${service}:.*|image: $IMAGE_PREFIX/${service}:${SLUG}-${CI_COMMIT_SHORT_SHA}|\" \"\$COMPOSE_FILE\" &&
          case \"${service}\" in lins-server) SVC=\"server\";; lins-agent) SVC=\"agent\";; esac &&
          docker compose pull \"\$SVC\" &&
          docker compose up -d \"\$SVC\" &&
          for i in \$(seq 1 15); do
            if docker ps 2>/dev/null | awk -v n=\"${service}\" 'NR>1 && \$NF==n {f=1} END{exit !f}'; then
              echo 'DEPLOY_OK'
              docker rmi $IMAGE_PREFIX/${service}:\${OLD_TAG} 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done &&
          echo '=== 启动失败，回退到旧版本 ===' &&
          sed -i \"s|image: $IMAGE_PREFIX/${service}:.*|image: $IMAGE_PREFIX/${service}:\${OLD_TAG}|\" \"\$COMPOSE_FILE\" &&
          docker compose down &&
          docker compose up -d &&
          curl -s -H \"Authorization: Bearer $GHCR_TOKEN\" \
            \"https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions\" \
            | jq -r --arg tag \"${SLUG}-${CI_COMMIT_SHORT_SHA}\" \
              '.[] | select(.metadata.container.tags | any(. == \$tag)) | .id' \
            | while read id; do
              curl -s -X DELETE -H \"Authorization: Bearer $GHCR_TOKEN\" \
                \"https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions/\$id\"
            done &&
          echo 'DEPLOY_ROLLBACK'
        " 2>&1)

        echo "$RESULT"

        if echo "$RESULT" | grep -q "DEPLOY_OK"; then
          echo "${service}: 部署成功"
          [ -n "$SUCCEEDED_SERVICES" ] && SUCCEEDED_SERVICES="${SUCCEEDED_SERVICES}, "
          SUCCEEDED_SERVICES="${SUCCEEDED_SERVICES}${service}"
          DEPLOYED_COUNT=$((DEPLOYED_COUNT + 1))
        elif echo "$RESULT" | grep -q "DEPLOY_ROLLBACK"; then
          echo "${service}: 部署失败，已回滚"
          DEPLOY_STATUS="rollback"
          FAILED_SERVICE="$service"
          break
        elif echo "$RESULT" | grep -q "COMPOSE_NOT_FOUND"; then
          echo "${service}: 远程无 Compose 文件，跳过"
          DEPLOYED_COUNT=$((DEPLOYED_COUNT + 1))
        else
          echo "${service}: 部署出错"
          DEPLOY_STATUS="failure"
          FAILED_SERVICE="$service"
          break
        fi
      done

      # 统计未部署的服务
      if [ "$DEPLOY_STATUS" != "success" ]; then
        COUNT=0
        for s in $SERVICES; do
          COUNT=$((COUNT + 1))
          if [ "$COUNT" -gt "$DEPLOYED_COUNT" ] && [ "$s" != "$FAILED_SERVICE" ]; then
            [ -n "$SKIPPED_SERVICES" ] && SKIPPED_SERVICES="${SKIPPED_SERVICES}, "
            SKIPPED_SERVICES="${SKIPPED_SERVICES}${s}"
          fi
        done
      fi

      echo "$DEPLOY_STATUS" > deploy-status.txt
      echo "$FAILED_SERVICE" > failed-service.txt
      echo "$SUCCEEDED_SERVICES" > succeeded-services.txt
      echo "$SKIPPED_SERVICES" > skipped-services.txt

      # 部署不成功时清理 GHCR 上的失败镜像（兜底）
      if [ "$DEPLOY_STATUS" != "success" ]; then
        for service in $SERVICES; do
          curl -s -H "Authorization: Bearer $GHCR_TOKEN" \
            "https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions" \
            | jq -r --arg tag "${SLUG}-${CI_COMMIT_SHORT_SHA}" \
              '.[] | select(.metadata.container.tags | any(. == $tag)) | .id' \
            | while read id; do
              curl -s -X DELETE -H "Authorization: Bearer $GHCR_TOKEN" \
                "https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions/$id"
            done
        done
      fi

      set -e
      [ "$DEPLOY_STATUS" = "success" ]

# ====== 钉钉通知阶段（任何结果都执行） ======
notify:
  stage: notify
  when: always
  needs: [deploy]
  dependencies:
    - deploy
  before_script: []
  script:
    - apk add --no-cache jq curl openssl
    - |
      if [ -f deploy-status.txt ]; then
        DEPLOY_STATUS=$(cat deploy-status.txt)
        FAILED_SERVICE=$(cat failed-service.txt 2>/dev/null || echo "")
        SUCCEEDED_SERVICES=$(cat succeeded-services.txt 2>/dev/null || echo "")
        SKIPPED_SERVICES=$(cat skipped-services.txt 2>/dev/null || echo "")
      else
        DEPLOY_STATUS=""
      fi

      SHA="$CI_COMMIT_SHORT_SHA"
      AUTHOR=$(git log -1 --format='%an')
      MSG_TITLE=$(git log -1 --format='%s' | head -c 50)

      START_TS=$(date -d "${CI_PIPELINE_CREATED_AT}" +%s 2>/dev/null || echo "")
      [ -z "$START_TS" ] && START_TS=$(date +%s)
      DURATION=$(( $(date +%s) - START_TS ))
      MIN=$(( DURATION / 60 ))
      SEC=$(( DURATION % 60 ))

      eval DINGTALK_TOKEN=\$DINGTALK_ACCESS_TOKEN_${SLUG}
      eval DINGTALK_SECRET=\$DINGTALK_SECRET_${SLUG}
      ACCESS_TOKEN="${DINGTALK_TOKEN##*access_token=}"
      ACCESS_TOKEN="${ACCESS_TOKEN%%&*}"
      TIMESTAMP=$(($(date +%s) * 1000))
      SIGN=$(printf '%s\n%s' "$TIMESTAMP" "$DINGTALK_SECRET" | openssl dgst -sha256 -hmac "$DINGTALK_SECRET" -binary | base64 -w 0)
      WEBHOOK="https://oapi.dingtalk.com/robot/send?access_token=$ACCESS_TOKEN&timestamp=$TIMESTAMP&sign=$SIGN"

      if [ -z "$DEPLOY_STATUS" ]; then
        MSG=$(printf '❌ 构建失败\n项目：%s\n分支：%s\n提交：%s %s\n提交人：%s\n耗时：%d分%d秒' \
          "$CI_PROJECT_PATH" "$SLUG" "$SHA" "$MSG_TITLE" "$AUTHOR" "$MIN" "$SEC")
      elif [ "$DEPLOY_STATUS" = "success" ]; then
        MSG=$(printf '✅ 构建部署成功\n项目：%s\n分支：%s\n提交：%s %s\n提交人：%s\n服务：%s\n耗时：%d分%d秒' \
          "$CI_PROJECT_PATH" "$SLUG" "$SHA" "$MSG_TITLE" "$AUTHOR" "$SERVICES" "$MIN" "$SEC")
      else
        DETAIL=""
        if [ -n "$SUCCEEDED_SERVICES" ]; then
          DETAIL="${DETAIL}✅ 部署成功：${SUCCEEDED_SERVICES}\n"
        fi
        if [ -n "$FAILED_SERVICE" ]; then
          if [ "$DEPLOY_STATUS" = "rollback" ]; then
            DETAIL="${DETAIL}❌ 回滚：${FAILED_SERVICE}（已回滚旧版本，已删除失败镜像）\n"
          else
            DETAIL="${DETAIL}❌ 失败：${FAILED_SERVICE}\n"
          fi
        fi
        if [ -n "$SKIPPED_SERVICES" ]; then
          DETAIL="${DETAIL}⏭  未部署：${SKIPPED_SERVICES}\n"
        fi
        MSG=$(printf '❌ 部分服务部署失败\n项目：%s\n分支：%s\n提交：%s %s\n提交人：%s\n\n%s耗时：%d分%d秒' \
          "$CI_PROJECT_PATH" "$SLUG" "$SHA" "$MSG_TITLE" "$AUTHOR" "$DETAIL" "$MIN" "$SEC")
      fi

      curl -s -X POST "$WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "$(jq -n --arg msg "$MSG" '{msgtype:"text",text:{content:$msg}}')"

# ====== GHCR 旧版本清理阶段 ======
cleanup:
  stage: cleanup
  when: always
  needs: [deploy]
  before_script: []
  script:
    - apk add --no-cache curl jq
    - |
      for service in $SERVICES; do
        echo "========== 清理 ${service} 旧版本 =========="
        curl -s -H "Authorization: Bearer $GHCR_TOKEN" \
          "https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions" \
          > /tmp/versions-${service}.json
        cat /tmp/versions-${service}.json | jq -r --arg slug "$SLUG" --arg svc "${service}" '
          [.[]
            | select(.metadata.container.tags | any(startswith($slug + "-")))
            | select(.metadata.container.tags | any(contains("buildcache")) | not)
            | {id, created_at: .created_at}
          ]
          | sort_by(.created_at)
          | reverse
          | .[5:][]
          | .id
        ' | while read id; do
          echo "删除 ${service} 旧版本 $id"
          curl -s -X DELETE -H "Authorization: Bearer $GHCR_TOKEN" \
            "https://api.github.com/users/$GHCR_USERNAME/packages/container/${service}/versions/$id"
        done
      done
