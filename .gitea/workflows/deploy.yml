name: 构建和部署

on:
  push:
    branches: [main]
    paths: ['lins-server/**', 'lins-agent/**']

env:
  SERVICES: '["lins-server","lins-agent"]'
  IMAGE_PREFIX: ghcr.io/linwen607
  GHCR_USERNAME: LINWEN607

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: sh
    outputs:
      SHORT_SHA: ${{ steps.vars.outputs.SHORT_SHA }}
      IMAGE_SLUG: ${{ steps.vars.outputs.IMAGE_SLUG }}
      BUILD_MATRIX: ${{ steps.changes.outputs.BUILD_MATRIX }}
      AUTHOR: ${{ steps.author.outputs.AUTHOR }}
      START_TIME: ${{ steps.timer.outputs.START_TIME }}
    steps:
      - name: 安装工具
        run: apk add --no-cache jq openssh-client sshpass curl openssl 2>/dev/null || true

      - name: 记录开始时间
        id: timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_OUTPUT

      - name: 拉取代码
        run: |
          git clone --depth 2 "${{ gitea.server_url }}/${{ gitea.repository }}.git" .

      - name: 获取提交人
        id: author
        run: echo "AUTHOR=$(git log -1 --format='%an')" >> $GITHUB_OUTPUT

      - name: 检测变更项目
        id: changes
        run: |
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only 4b825dc642cb6eb9a060e54bf899d153036e1e9f HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          MATRIX='{}'
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            ENTRY='{"build":false,"deploy":false}'
            if echo "$CHANGED" | grep -q "^${service}/" && \
               echo "$CHANGED" | grep -vq "^${service}/docker-compose.yml"; then
              ENTRY='{"build":true,"deploy":true}'
            fi
            MATRIX=$(echo "$MATRIX" | jq --arg s "$service" --argjson e "$ENTRY" '. + {($s): $e}')
          done
          echo "BUILD_MATRIX=$(echo $MATRIX | jq -c .)" >> $GITHUB_OUTPUT

      - name: 设置变量
        id: vars
        run: |
          echo "SHORT_SHA=$(echo ${{ gitea.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "IMAGE_SLUG=${{ gitea.ref_name }}" >> $GITHUB_OUTPUT

      - name: 登录 GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u $GHCR_USERNAME --password-stdin

      - name: 构建所有变更服务
        run: |
          SLUG=${{ steps.vars.outputs.IMAGE_SLUG }}
          SHA=${{ steps.vars.outputs.SHORT_SHA }}
          MATRIX='${{ steps.changes.outputs.BUILD_MATRIX }}'

          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            BUILD=$(echo "$MATRIX" | jq -r ".[\"$service\"].build")
            [ "$BUILD" != "true" ] && continue

            IMAGE="${IMAGE_PREFIX}/${service}"

            CACHE_FILE="/cache/docker-build/${SLUG}-${service}-buildcache.tar.gz"
            mkdir -p /cache/docker-build
            [ -f "$CACHE_FILE" ] && docker load -i "$CACHE_FILE" || true

            docker build \
              --cache-from "$IMAGE:$SLUG-buildcache" \
              -t "$IMAGE:$SLUG-$SHA" \
              -t "$IMAGE:$SLUG-buildcache" \
              -f "${service}/Dockerfile" "${service}/"
            docker push "$IMAGE:$SLUG-$SHA"

            if [ ! -f "$CACHE_FILE" ]; then
              docker save "$IMAGE:$SLUG-buildcache" | gzip > "$CACHE_FILE"
            fi
          done

  deploy:
    needs: build
    if: success() && needs.build.outputs.BUILD_MATRIX != '{}'
    runs-on: self-hosted
    defaults:
      run:
        shell: sh
    steps:
      - name: 安装部署工具
        run: |
          sed -i 's|dl-cdn.alpinelinux.org|mirrors.aliyun.com|g' /etc/apk/repositories 2>/dev/null || true
          apk add --no-cache openssh-client sshpass curl jq openssl 2>/dev/null || true

      - name: 部署服务
        id: deploy
        env:
          TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          SHORT_SHA=${{ needs.build.outputs.SHORT_SHA }}
          SLUG=${{ needs.build.outputs.IMAGE_SLUG }}
          MATRIX='${{ needs.build.outputs.BUILD_MATRIX }}'

          STATUS='{}'
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            DEPLOY=$(echo "$MATRIX" | jq -r ".[\"$service\"].deploy")
            [ "$DEPLOY" != "true" ] && continue

            case "$service" in
              lins-server)
                HOST=${{ secrets.SSH_HOST_SERVER_MAIN }}
                PASS=${{ secrets.SSH_PASS_SERVER_MAIN }}
                ;;
              lins-agent)
                HOST=${{ secrets.SSH_HOST_AGENT_MAIN }}
                PASS=${{ secrets.SSH_PASS_AGENT_MAIN }}
                ;;
            esac

            IMAGE="${IMAGE_PREFIX}/${service}"
            SERVICE_STATUS="success"
            export SSHPASS="$PASS"

            RESULT=$(sshpass -e ssh -o StrictHostKeyChecking=no "root@$HOST" "
              cd /data/linscloud/${service} &&
              COMPOSE_FILE=\$(ls docker-compose.yaml docker-compose.yml 2>/dev/null | head -1) &&
              if [ -z \"\$COMPOSE_FILE\" ]; then echo 'COMPOSE_NOT_FOUND'; exit 0; fi &&
              OLD_TAG=\$(grep 'image: $IMAGE:' \"\$COMPOSE_FILE\" | sed 's|.*$IMAGE:||') &&
              sed -i \"s|image: $IMAGE:.*|image: $IMAGE:$SLUG-$SHORT_SHA|\" \"\$COMPOSE_FILE\" &&
              echo '$TOKEN' | docker login ghcr.io -u $GHCR_USERNAME --password-stdin &&
              docker compose pull &&
              docker compose down &&
              docker compose up -d &&
              for i in \$(seq 1 15); do
                if docker ps 2>/dev/null | awk -v n="$service" 'NR>1 && \$NF==n {f=1} END{exit !f}'; then
                  echo 'DEPLOY_OK'; exit 0
                fi
                sleep 2
              done &&
              sed -i \"s|image: $IMAGE:.*|image: $IMAGE:\$OLD_TAG|\" \"\$COMPOSE_FILE\" &&
              docker compose down &&
              docker compose up -d &&
              curl -s -H \"Authorization: Bearer $TOKEN\" \
                \"https://api.github.com/users/$GHCR_USERNAME/packages/container/$service/versions\" \
                | jq -r '.[] | select(.metadata.container.tags[] | contains(\"$SLUG-$SHORT_SHA\")) | .id' \
                | while read id; do
                  curl -s -X DELETE -H \"Authorization: Bearer $TOKEN\" \
                    \"https://api.github.com/users/$GHCR_USERNAME/packages/container/$service/versions/\$id\"
                done &&
              echo 'DEPLOY_ROLLBACK'
            ")

            case "$RESULT" in
              *DEPLOY_OK*) SERVICE_STATUS="success" ;;
              *DEPLOY_ROLLBACK*) SERVICE_STATUS="rollback" ;;
              *COMPOSE_NOT_FOUND*) echo "跳过 ${service}：远程无 compose 文件"; continue ;;
            esac

            STATUS=$(echo "$STATUS" | jq --arg s "$service" --arg v "$SERVICE_STATUS" '. + {($s): $v}')
          done

          echo "STATUS_MATRIX=$(echo $STATUS | jq -c .)" >> $GITHUB_ENV
          HAS_ROLLBACK=$(echo "$STATUS" | jq '[.[] == "rollback"] | any')
          [ "$HAS_ROLLBACK" = "true" ] && exit 1

      - name: 发送钉钉通知
        if: success() || failure()
        env:
          ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN_MAIN }}
          SECRET: ${{ secrets.DINGTALK_SECRET_MAIN }}
        run: |
          ACCESS_TOKEN="${ACCESS_TOKEN##*access_token=}"
          ACCESS_TOKEN="${ACCESS_TOKEN%%&*}"

          SHORT_SHA=${{ needs.build.outputs.SHORT_SHA }}
          AUTHOR=${{ needs.build.outputs.AUTHOR }}
          START_TIME=${{ needs.build.outputs.START_TIME }}
          DURATION=$(( $(date +%s) - START_TIME ))
          MIN=$(( DURATION / 60 ))
          SEC=$(( DURATION % 60 ))
          MATRIX='${{ needs.build.outputs.BUILD_MATRIX }}'
          STATUS='${{ env.STATUS_MATRIX }}'

          SUCCESS_LIST=""; ROLLBACK_LIST=""; SKIP_LIST=""
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            DEPLOY=$(echo "$MATRIX" | jq -r ".[\"$service\"].deploy")
            if [ "$DEPLOY" != "true" ]; then
              SKIP_LIST="${SKIP_LIST} $service"; continue
            fi
            ST=$(echo "$STATUS" | jq -r ".[\"$service\"]")
            case "$ST" in
              "success") SUCCESS_LIST="${SUCCESS_LIST} $service" ;;
              "rollback") ROLLBACK_LIST="${ROLLBACK_LIST} $service" ;;
              *) SKIP_LIST="${SKIP_LIST} $service" ;;
            esac
          done
          SUCCESS_LIST=$(echo "$SUCCESS_LIST" | xargs)
          ROLLBACK_LIST=$(echo "$ROLLBACK_LIST" | xargs)
          SKIP_LIST=$(echo "$SKIP_LIST" | xargs)

          TIMESTAMP=$(($(date +%s) * 1000))
          SIGN=$(printf '%s\n%s' "$TIMESTAMP" "$SECRET" | openssl dgst -sha256 -hmac "$SECRET" -binary | base64 -w 0)
          WEBHOOK="https://oapi.dingtalk.com/robot/send?access_token=$ACCESS_TOKEN&timestamp=$TIMESTAMP&sign=$SIGN"

          if [ -z "$ROLLBACK_LIST" ]; then
            MSG=$(printf '✅ 构建部署成功\n项目：%s\n分支：main\n提交：%s %s\n提交人：%s\n耗时：%d分%d秒\n部署服务：%s' \
              "${{ gitea.repository }}" "$SHORT_SHA" "${{ gitea.message }}" "$AUTHOR" "$MIN" "$SEC" "$SUCCESS_LIST")
            [ -n "$SKIP_LIST" ] && MSG="${MSG}\n未部署：${SKIP_LIST}"
          else
            MSG=$(printf '❌ 部分服务部署失败\n项目：%s\n分支：main\n提交：%s %s\n提交人：%s' \
              "${{ gitea.repository }}" "$SHORT_SHA" "${{ gitea.message }}" "$AUTHOR")
            [ -n "$SUCCESS_LIST" ] && MSG="${MSG}\n部署成功：${SUCCESS_LIST}"
            [ -n "$ROLLBACK_LIST" ] && MSG="${MSG}\n部署回滚：${ROLLBACK_LIST}（已回滚旧版本，已删除失败镜像）"
            [ -n "$SKIP_LIST" ] && MSG="${MSG}\n未部署：${SKIP_LIST}"
          fi

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg msg "$MSG" '{msgtype:"text",text:{content:$msg}}')"

      - name: 清理旧版 GHCR 镜像（每服务保留 5 个）
        if: always()
        env:
          TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/users/$GHCR_USERNAME/packages/container/$service/versions" \
              > /tmp/versions-$service.json
            cat /tmp/versions-$service.json | jq -r '
              [.[]
                | select(.metadata.container.tags | any(startswith("main-")))
                | {id, created_at: .created_at}
              ]
              | sort_by(.created_at)
              | reverse
              | .[5:][]
              | .id
            ' | while read id; do
              echo "删除 $service 旧版本 $id"
              curl -s -X DELETE -H "Authorization: Bearer $TOKEN" \
                "https://api.github.com/users/$GHCR_USERNAME/packages/container/$service/versions/$id"
            done
          done