<!DOCTYPE html>
<html>
<head>
  <div  th:replace="common/header.html"></div>

</head>
<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

  <div th:replace="common/navbar.html"></div>

  <div th:replace="common/aside.html"></div>

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper" style="font-size: 0.9rem">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->

    <!-- Main content -->
    <section class="content">
      <div class="container-fluid">

        <!-- Dashboard Cards -->
        <div class="row">
          <!-- 主机 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#1a3a5c;">
                <i class="fas fa-server"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">主机</div>
                <div class="dash-card-subtitle">服务器监测</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${totalSystemInfoSize}">0</span>
                </div>
                <div class="dash-card-meta">
                  <span class="dash-online" th:text="'在线 ' + ${systemInfoOnlineSize}">在线 0</span>
                  <span class="dash-sep">|</span>
                  <span th:if="${totalSystemInfoSize > 0}" class="dash-pct"
                        th:text="${#numbers.formatDecimal((systemInfoOnlineSize * 100.0 / totalSystemInfoSize), 1, 2)} + '%'">0%</span>
                  <span th:if="${totalSystemInfoSize == 0}" class="dash-pct">0%</span>
                </div>
              </div>
              <a th:href="@{'/dash/systemInfoList'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 进程 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#1a4a3a;">
                <i class="fas fa-microchip"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">进程</div>
                <div class="dash-card-subtitle">业务进程监控</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${totalSizeApp}">0</span>
                </div>
                <div class="dash-card-meta">
                  <span class="dash-online" th:text="'在线 ' + ${appInfoOnlineSize}">在线 0</span>
                  <span class="dash-sep">|</span>
                  <span th:if="${totalSizeApp > 0}" class="dash-pct"
                        th:text="${#numbers.formatDecimal((appInfoOnlineSize * 100.0 / totalSizeApp), 1, 2)} + '%'">0%</span>
                  <span th:if="${totalSizeApp == 0}" class="dash-pct">0%</span>
                </div>
              </div>
              <a th:href="@{'/appInfo/list'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 数据库 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#3a2a1a;">
                <i class="fas fa-database"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">数据库</div>
                <div class="dash-card-subtitle">数据源监控</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${dbInfoSize}">0</span>
                </div>
                <div class="dash-card-meta">
                  <span class="dash-online" th:text="'在线 ' + ${dbInfoOnlineSize}">在线 0</span>
                  <span class="dash-sep">|</span>
                  <span th:if="${dbInfoSize > 0}" class="dash-pct"
                        th:text="${#numbers.formatDecimal((dbInfoOnlineSize * 100.0 / dbInfoSize), 1, 2)} + '%'">0%</span>
                  <span th:if="${dbInfoSize == 0}" class="dash-pct">0%</span>
                </div>
              </div>
              <a th:href="@{'/dbInfo/list'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 服务 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#3a1a3a;">
                <i class="fas fa-globe"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">服务</div>
                <div class="dash-card-subtitle">服务探活</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${heathSize}">0</span>
                </div>
                <div class="dash-card-meta">
                  <span class="dash-online" th:text="'在线 ' + ${heath200Size}">在线 0</span>
                  <span class="dash-sep">|</span>
                  <span th:if="${heathSize > 0}" class="dash-pct"
                        th:text="${#numbers.formatDecimal((heath200Size * 100.0 / heathSize), 1, 2)} + '%'">0%</span>
                  <span th:if="${heathSize == 0}" class="dash-pct">0%</span>
                </div>
              </div>
              <a th:href="@{'/heathMonitor/list'}" class="dash-card-link"></a>
            </div>
          </div>
        </div>
        <!-- /.row -->

        <!-- Second row: DOCKER + logs + data table chart -->
        <div class="row">
          <!-- DOCKER -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#1a2a3a;">
                <i class="fab fa-docker"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">DOCKER</div>
                <div class="dash-card-subtitle">容器监测</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${totalContainerSize}">0</span>
                </div>
                <div class="dash-card-meta">
                  <span class="dash-online" th:text="'在线 ' + ${containerOnlineSize}">在线 0</span>
                  <span class="dash-sep">|</span>
                  <span th:if="${totalContainerSize > 0}" class="dash-pct"
                        th:text="${#numbers.formatDecimal((containerOnlineSize * 100.0 / totalContainerSize), 1, 2)} + '%'">0%</span>
                  <span th:if="${totalContainerSize == 0}" class="dash-pct">0%</span>
                </div>
              </div>
              <a th:href="@{'/containerInfo/list'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 系统日志 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#2a1a1a;">
                <i class="fas fa-history"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">系统日志</div>
                <div class="dash-card-subtitle">已产生日志</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${logSize}">0</span>
                </div>
              </div>
              <a th:href="@{'/log/list'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 数据表统计 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#1a2a2a;">
                <i class="fas fa-table"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">数据表</div>
                <div class="dash-card-subtitle">监控表 / 总数据</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${dbTableSize}">0</span>
                  <span class="dash-total-sub">/ <span th:text="${dbTableSum}">0</span></span>
                </div>
              </div>
              <a th:href="@{'/dbTable/list'}" class="dash-card-link"></a>
            </div>
          </div>
          <!-- 异常服务 -->
          <div class="col-lg-3 col-6">
            <div class="dashboard-card">
              <div class="dash-card-icon" style="background:#3a1a1a;">
                <i class="fas fa-exclamation-triangle"></i>
              </div>
              <div class="dash-card-body">
                <div class="dash-card-title">异常</div>
                <div class="dash-card-subtitle">异常服务接口</div>
                <div class="dash-card-stats">
                  <span class="dash-total" th:text="${heatherrSize}">0</span>
                </div>
              </div>
              <a th:href="@{'/heathMonitor/list'}" class="dash-card-link"></a>
            </div>
          </div>
        </div>
        <!-- /.row -->

        <!-- Charts row -->
        <div class="row" style="margin-top: 20px;">
          <section class="col-lg-7 connectedSortable">
            <div class="card" id="chartInfoList"></div>
          </section>
          <section class="col-lg-5 connectedSortable ui-sortable">
            <div class="card" id="dbTableList"></div>
          </section>
        </div>

      </div><!-- /.container-fluid -->
    </section>
    <!-- /.content -->
  </div>
  <div th:replace="common/chart.html"></div>
  <div th:replace="common/footer.html"></div>

</div>
<!-- ./wrapper -->


<script th:inline="javascript">

  const data = [[${chartInfoList}]];

  const chart = new G2.Chart({
    container: 'chartInfoList',
    forceFit: true,
    height: 500,
    animate: false
  });
  chart.source(data, {
    percent: {
      formatter: val => {
      val = (val * 100) + '%';
  return val;
  }
  }
  });
  chart.coord('theta', {
    radius: 0.75,
    innerRadius: 0.6
  });
  chart.tooltip({
    showTitle: false,
    itemTpl: '<li><span style="background-color:{color};" class="g2-tooltip-marker"></span>{name}: {value}</li>'
  });
  // 辅助文本
  chart.guide().html({
    position: [ '50%', '50%' ],
    html: '<div style="color:#d1d1d6;font-size: 14px;text-align: center;width: 10em;">监控主机<br><span style="color:#d1d1d6;font-size:20px">[[${totalSystemInfoSize}]]</span>台</div>',
    alignX: 'middle',
    alignY: 'middle'
  });
  const interval = chart.intervalStack()
          .position('percent')
          .color('item')
          .label('count', {
            formatter: (val, item) => {
            return item.point.item + ': ' + val;
  }
  })
  .tooltip('item*percent', (item, percent) => {
    percent = percent * 100 + '%';
  return {
    name: item,
    value: percent
  };
  })
  .style({
    lineWidth: 1,
    stroke: '#fff'
  });
  chart.render();
  interval.setSelected(data[0]);

  const data2 = [[${dbTableList}]];
  const chart2 = new G2.Chart({
    container: 'dbTableList',
    forceFit: true,
    height: 500,
    padding: [ 20, 40, 50, 124 ]
  });
  chart2.source(data2, {
    value: {
      min: 0,
      nice: false,
      alias: '条'
    }
  });
  chart2.axis('tableName', {
    label: {
      textStyle: {
        fill: '#d1d1d6',
        fontSize: 12
      }
    },
    tickLine: {
      alignWithLabel: false,
      length: 0
    },
    line: {
      lineWidth: 0
    }
  });
  chart2.axis('value', {
    label: null,
    title: {
      offset: 30,
      textStyle: {
        fontSize: 12,
        fontWeight: 300
      }
    }
  });
  chart2.legend(false);
  chart2.coord().transpose();
  chart2.interval().position('tableName*value').size(26)
          .opacity(1)
          .label('value', {
            textStyle: {
              fill: '#8d8d8d'
            },
            offset: 10
          });
  chart2.render();
</script>
</body>
</html>
