<!DOCTYPE html>
<html>
<head>
<div th:replace="common/header.html"></div>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
  <div th:replace="common/navbar.html"></div>
  <div th:replace="common/aside.html"></div>
  <div class="content-wrapper">
    <section class="content">
      <div class="container-fluid">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title" th:text="${logMonitor.id == null} ? '新增Nginx日志监控' : '编辑Nginx日志监控'"></h3>
          </div>
          <form th:action="@{'/logMonitor/save'}" method="post" class="form-horizontal">
            <input type="hidden" name="id" th:value="${logMonitor.id}" />
            <input type="hidden" name="monitorType" value="nginx" />
            <div class="card-body">
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">主机</label>
                <div class="col-sm-8">
                  <select name="hostname" class="form-control select2" style="width:100%;" required>
                    <option value="">-- 请选择 --</option>
                    <option th:each="si : ${systemInfoList}" th:value="${si.hostname}" th:text="${si.remark}" th:selected="${si.hostname == logMonitor.hostname}"></option>
                  </select>
                </div>
              </div>
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">日志文件路径</label>
                <div class="col-sm-8">
                  <input type="text" name="logFilePath" class="form-control" th:value="${logMonitor.logFilePath}" placeholder="/var/log/nginx/access.log" required />
                </div>
              </div>
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">自定义关键词</label>
                <div class="col-sm-8">
                  <input type="text" name="customKeywords" class="form-control" th:value="${logMonitor.customKeywords}" placeholder="多个关键词用逗号分隔，行包含任一即匹配" />
                </div>
              </div>
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">启用告警</label>
                <div class="col-sm-8">
                  <select name="enableAlert" class="form-control" style="width:200px;">
                    <option value="1" th:selected="${logMonitor.enableAlert == 1 || logMonitor.enableAlert == null}">是</option>
                    <option value="0" th:selected="${logMonitor.enableAlert == 0}">否</option>
                  </select>
                </div>
              </div>
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">状态</label>
                <div class="col-sm-8">
                  <select name="state" class="form-control" style="width:200px;">
                    <option value="1" th:selected="${logMonitor.state == '1' || logMonitor.state == null}">启用</option>
                    <option value="2" th:selected="${logMonitor.state == '2'}">停用</option>
                  </select>
                </div>
              </div>
              <div class="form-group row">
                <label class="col-sm-2 col-form-label">备注</label>
                <div class="col-sm-8">
                  <input type="text" name="remark" class="form-control" th:value="${logMonitor.remark}" />
                </div>
              </div>
            </div>
            <div class="card-footer">
              <button type="submit" class="btn btn-primary">保存</button>
              <a th:href="@{'/logMonitor/nginx/list'}" class="btn btn-default">返回</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </div>
  <div th:replace="common/footer.html"></div>
</div>
</body>
</html>
