<!DOCTYPE html>
<html>
<head>
  <div th:replace="common/header.html"></div>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div th:replace="common/chart.html"></div>

<div class="wrapper">

  <div th:replace="common/navbar.html"></div>

  <div th:replace="common/aside.html"></div>

  <div class="content-wrapper" style="font-size: 0.9rem">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1></h1>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">

  <div class="col-md-10">
    <div class="card card-primary">
      <div class="card-header">
        <h3 class="card-title">添加容器监控</h3>
          <div class="float-sm-right">
              <a th:href="@{'/containerInfo/list'}">返回</a>
          </div>
      </div>
        <form role="form" id="form1" th:action="@{'/containerInfo/save'}">
            <input type="hidden" name="id" th:value="${containerInfo.id}"/>
            <div class="card-body">
                <div class="form-group">
                    <label><font color="red">*</font>监控主机</label>
                    <select name="hostname" id="hostname" class="validate[required] form-control select2" style="width: 100%;">
                        <option value="">请选择</option>
                        <th:block th:each="item,iterStat : ${systemInfoList}">
                            <option th:attr="data-select2-id=${item.hostname}" th:text="${item.hostname}"></option>
                        </th:block>
                    </select>
                </div>
                <div class="form-group">
                    <label><font color="red">*</font>容器名称</label>
                    <select name="containerName" id="containerName" class="validate[required] form-control select2" style="width: 100%;">
                        <option value="">请先选择主机IP</option>
                    </select>
                </div>
            </div>
            <div class="card-footer">
                <button type="submit" class="btn btn-primary btn-sm">保存</button>
                <button type="button" th:onclick="goback()" class="btn bg-gradient-danger btn-sm">返回</button>
            </div>
        </form>
    </div>
  </div>

        </div>
      </div>
    </section>
  </div>

  <div th:replace="common/footer.html"></div>

</div>
<link rel="stylesheet" th:href="@{'/static/js/jQuery/validationEngine.jquery.css'}" type="text/css"/>
<script th:src="@{'/static/js/jQuery/jquery.validationEngine-zh_CN.js'}" type="text/javascript" charset="utf-8"></script>
<script th:src="@{'/static/js/jQuery/jquery.validationEngine.js'}" type="text/javascript" charset="utf-8"></script>
<script th:inline="javascript">
    function loadContainerNames(hostname) {
        var $sel = $("#containerName");
        $sel.empty().append('<option value="">加载中...</option>');
        if (!hostname) {
            $sel.empty().append('<option value="">请先选择主机IP</option>');
            return;
        }
        $.get("/lins/containerInfo/containerNames", {hostname: hostname}, function(data) {
            $sel.empty().append('<option value="">请选择容器</option>');
            if (data && data.length > 0) {
                $.each(data, function(i, name) {
                    $sel.append('<option value="' + name + '">' + name + '</option>');
                });
            } else {
                $sel.append('<option value="">该主机暂无容器数据</option>');
            }
            var savedVal = [[${containerInfo.containerName}]];
            if (savedVal) {
                $sel.val(savedVal);
            }
            $sel.select2();
        });
    }

    $(document).ready(function(){
        $("#form1").validationEngine();
        $('.select2').select2();
        var savedHost = [[${containerInfo.hostname}]];
        if (savedHost) {
            $("#hostname").val(savedHost).select2();
            loadContainerNames(savedHost);
        } else {
            $("#hostname").select2();
        }
        $("#hostname").on('change', function(){
            loadContainerNames($(this).val());
        });
    });

    function goback() {
        window.location.href = "/lins/containerInfo/list";
    }
</script>
</body>
</html>
