<!DOCTYPE html>
<html>
<head>
  <div th:replace="common/header.html"></div>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div th:replace="common/chart.html"></div>

<div class="wrapper">

  <div th:replace="common/navbar.html"></div>

  <div th:replace="common/aside.html"></div>

  <div class="content-wrapper" style="font-size: 0.9rem">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1></h1>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">

  <div class="col-md-12">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">容器列表</h3>
        <div class=" float-sm-right">
          <form class="form-inline ml-3" th:action="@{'/containerInfo/list'}">
            <button type="button" onclick="showAddModal()" class="btn btn-primary btn-sm" style="margin-right:5px;">添加</button>
            <div class="input-group input-group-sm">
              <input class="form-control" name="hostname" autocomplete="off" th:value="${containerInfo.hostname}" type="text" placeholder="输入IP" style="width:120px;margin-right:3px;">
              <input class="form-control" name="containerName" autocomplete="off" th:value="${containerInfo.containerName}" type="text" placeholder="容器名" style="width:120px;margin-right:3px;">
              <div class="input-group-append">
                <button class="btn btn-primary" type="submit">
                  <i class="fas fa-search"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="card-body">
        <table class="table table-bordered">
          <thead>
          <tr>
            <th style="width: 80px">序号</th>
            <th>IP</th>
            <th>容器名称</th>
            <th>CPU使用率%</th>
            <th>内存使用率%</th>
            <th>状态</th>
            <th>更新时间</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody>
          <th:block th:each="item,iterStat : ${page.list}">
            <tr>
              <td th:text="${iterStat.index+1}">1</td>
              <td th:text="${item.hostname}"></td>
              <td>
                <th:block th:if="${item.state == '2'}">
                  <span style="color:red;font-weight:500;" th:text="${item.containerName}"></span>
                </th:block>
                <th:block th:if="${item.state != '2'}">
                  <span th:text="${item.containerName}"></span>
                </th:block>
              </td>
              <td>
                <th:block th:if="${item.cpuPer >= 90}">
                  <span class="badge bg-danger" th:text="${item.cpuPer}"></span>
                </th:block>
                <th:block th:if="${item.cpuPer < 90 && item.cpuPer >= 70}">
                  <span class="badge bg-warning" th:text="${item.cpuPer}"></span>
                </th:block>
                <th:block th:if="${item.cpuPer < 70}">
                  <span class="badge bg-primary" th:text="${item.cpuPer}"></span>
                </th:block>
              </td>
              <td>
                <th:block th:if="${item.memPer >= 90}">
                  <span class="badge bg-danger" th:text="${item.memPer}"></span>
                </th:block>
                <th:block th:if="${item.memPer < 90 && item.memPer >= 70}">
                  <span class="badge bg-warning" th:text="${item.memPer}"></span>
                </th:block>
                <th:block th:if="${item.memPer < 70}">
                  <span class="badge bg-primary" th:text="${item.memPer}"></span>
                </th:block>
              </td>
              <td>
                <th:block th:if="${item.state == '2'}">
                  <span class="badge bg-danger">离线</span>
                </th:block>
                <th:block th:if="${item.state != '2'}">
                  <span class="badge bg-success">在线</span>
                </th:block>
              </td>
              <td th:text="${#dates.format(item.createTime,'yyyy-MM-dd HH:mm:ss')}"></td>
              <td>
                <button type="button" th:onclick="showEditModal('[[${item.id}]]','[[${item.hostname}]]','[[${item.containerName}]]')" class="btn bg-gradient-primary btn-sm">编辑</button>
                <button type="button" th:onclick="del('[[${item.id}]]')" class="btn bg-gradient-danger btn-sm">删除</button>
              </td>
            </tr>
          </th:block>
          </tbody>
        </table>
      </div>
      <div th:replace="common/page.html"></div>
    </div>
  </div>

        </div>
      </div>
    </section>
  </div>

  <div th:replace="common/footer.html"></div>

</div>

<!-- Modal -->
<div class="modal fade" id="containerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title" id="modalTitle">添加容器监控</h4>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>
      <form id="modalForm" th:action="@{'/containerInfo/save'}" method="post">
        <div class="modal-body">
          <input type="hidden" name="id" id="editId"/>
          <div class="form-group">
            <label><font color="red">*</font>监控主机</label>
            <select name="hostname" id="modalHostname" class="validate[required] form-control select2" style="width:100%;">
              <option value="">请选择</option>
              <th:block th:each="item : ${systemInfoList}">
                <option th:value="${item.hostname}" th:text="${item.hostname}"></option>
              </th:block>
            </select>
          </div>
          <div class="form-group">
            <label><font color="red">*</font>容器名称</label>
            <select name="containerName" id="modalContainerName" class="validate[required] form-control select2" style="width:100%;">
              <option value="">请先选择主机IP</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary btn-sm">保存</button>
          <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">取消</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script th:inline="javascript">
    function loadContainerNames(hostname, callback) {
        var $sel = $("#modalContainerName");
        $sel.empty().append('<option value="">加载中...</option>');
        if (!hostname) {
            $sel.empty().append('<option value="">请先选择主机IP</option>');
            return;
        }
        $.get("/lins/containerInfo/containerNames", {hostname: hostname}, function(data) {
            $sel.empty().append('<option value="">请选择容器</option>');
            if (data && data.length > 0) {
                $.each(data, function(i, name) {
                    $sel.append('<option value="' + name + '">' + name + '</option>');
                });
            } else {
                $sel.append('<option value="">该主机暂无容器数据</option>');
            }
            $sel.select2();
            if (callback) callback();
        });
    }

    function showAddModal() {
        $("#modalTitle").text("添加容器监控");
        $("#editId").val("");
        $("#modalForm")[0].reset();
        $("#modalHostname").val("").select2();
        $("#modalContainerName").empty().append('<option value="">请先选择主机IP</option>').select2();
        $("#containerModal").modal("show");
    }

    function showEditModal(id, hostname, containerName) {
        $("#modalTitle").text("编辑容器监控");
        $("#editId").val(id);
        $("#modalHostname").val(hostname).select2();
        loadContainerNames(hostname, function(){
            $("#modalContainerName").val(containerName).select2();
        });
        $("#containerModal").modal("show");
    }

    function del(id) {
        if (confirm("你确定要删除吗？")) {
            window.location.href = "/lins/containerInfo/del?id=" + id;
        }
    }

    $(document).ready(function(){
        $('.select2').select2();
        $("#modalHostname").on('change', function(){
            loadContainerNames($(this).val());
        });
        $('#containerModal').on('hidden.bs.modal', function(){
            $("#editId").val("");
            $("#modalForm")[0].reset();
        });
    });
</script>

</body>
</html>
