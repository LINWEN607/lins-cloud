version: '3.8'
services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: wgcloud
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - /data/wgcloud/mysql:/var/lib/mysql
      - /data/wgcloud/server/wgcloud.sql:/docker-entrypoint-initdb.d/wgcloud.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: wgcloud-server:latest
    ports:
      - "9999:9999"
    environment:
      - TZ=Asia/Shanghai
      - spring.datasource.url=jdbc:mysql://mysql:3306/wgcloud?characterEncoding=utf-8&autoReconnect=true&useSSL=false&allowMultiQueries=true&serverTimezone=Asia/Shanghai
      - spring.datasource.username=root
      - spring.datasource.password=123456
    volumes:
      - /data/wgcloud/server/logs:/app/log
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mysql:
        condition: service_healthy