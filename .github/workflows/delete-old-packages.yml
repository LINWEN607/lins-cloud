name: Delete Old Packages

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: 'lins-server'
          package-type: 'container'
          min-versions-to-keep: 5
      - uses: actions/delete-package-versions@v5
        with:
          package-name: 'lins-agent'
          package-type: 'container'
          min-versions-to-keep: 5
