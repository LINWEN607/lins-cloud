name: Delete Old Packages

on:
  push:
    branches:
      - main

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old lins-server versions
        env:
          TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          versions=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/user/packages/container/lins-server/versions" | jq -r 'sort_by(.created_at) | .[:-5][] | .id')
          for v in $versions; do
            curl -s -X DELETE -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/user/packages/container/lins-server/versions/$v"
          done

      - name: Delete old lins-agent versions
        env:
          TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          versions=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/user/packages/container/lins-agent/versions" | jq -r 'sort_by(.created_at) | .[:-5][] | .id')
          for v in $versions; do
            curl -s -X DELETE -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/user/packages/container/lins-agent/versions/$v"
          done
