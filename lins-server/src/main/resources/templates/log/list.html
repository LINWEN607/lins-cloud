<!DOCTYPE html>
<html>
<head>
  <div  th:replace="common/header.html"></div>

</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div th:replace="common/chart.html"></div>

<div class="wrapper">

  <div th:replace="common/navbar.html"></div>

  <div th:replace="common/aside.html"></div>

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper" style="font-size: 0.9rem">
    <!-- Content Header (Page header) -->
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1></h1>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"></li>
            </ol>
          </div>
        </div>
      </div><!-- /.container-fluid -->
    </section>

    <!-- Main content -->
    <section class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-md-12">
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">系统日志列表</h3>
              </div>
              <!-- /.card-header -->
              <div class="card-body">
                <div id="example1_wrapper" class="dataTables_wrapper dt-bootstrap4">
                  <div class="row">
                    <div class="col-sm-12">
                      <form th:action="@{'/log/list'}" method="post">
                        <table style="width:100%">
                          <tbody><tr>
                            <td style="width:80px"><b>主机名：</b></td>
                            <td style="width:130px"><input type="text" th:value="${logInfo.hostname}" name="hostname" class="form-control" placeholder="主机名"></td>
                            <td style="width:20px">&nbsp;</td>
                            <td style="width:60px"><button type="submit" class="btn btn-block btn-primary btn-sm">搜索</button></td>
                          </tr>
                        </tbody></table>
                      </form>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-sm-12">
                      <table class="table table-bordered" style="table-layout: fixed">
                        <thead>
                        <tr>
                          <th style="width: 60px">序号</th>
                          <th style="width: 80px">事件</th>
                          <th>摘要</th>
                          <th style="width: 120px">主机名称</th>
                          <th style="width: 150px">时间</th>
                          <th style="width: 70px">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <th:block th:each="item,iterStat : ${page.list}">
                          <tr>
                            <td th:text="${iterStat.index+1}"></td>
                            <td>
                              <th:block th:if="${item.state == '1'}">告警</th:block>
                              <th:block th:unless="${item.state == '1'}">信息</th:block>
                            </td>
                            <td style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap" th:text="${item.infoContent.length() > 80 ? item.infoContent.substring(0, 80) + '...' : item.infoContent}" title="${item.infoContent}"></td>
                            <td style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap" th:text="${item.hostname}" title="${item.hostname}"></td>
                            <td th:text="${item.createTime != null ? #dates.format(item.createTime,'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                            <td>
                              <button type="button" th:data-id="${item.id}" onclick="view(this.dataset.id)" class="btn bg-gradient-primary btn-sm">查看</button>
                            </td>
                          </tr>
                        </th:block>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
              <!-- /.card-body -->
              <div th:replace="common/page.html"></div>
            </div>
            <!-- /.card -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <div th:replace="common/footer.html"></div>

</div>
<!-- ./wrapper -->

<script th:src="@{'/static/js/log.js'}"></script>
</body>
</html>
