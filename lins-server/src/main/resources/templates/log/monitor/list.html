<!DOCTYPE html>
<html>
<head>
<div th:replace="common/header.html"></div>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
  <div th:replace="common/navbar.html"></div>
  <div th:replace="common/aside.html"></div>
  <div class="content-wrapper">
    <section class="content">
      <div class="container-fluid">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">日志监控列表</h3>
            <div class="card-tools">
              <a th:href="@{'/logMonitor/edit'}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> 新增</a>
            </div>
          </div>
          <div class="card-body">
            <form method="get" th:action="@{'/logMonitor/list'}">
              <div class="row" style="margin-bottom:10px;">
                <div class="col-md-3">
                  <select name="remark" class="form-control form-control-sm select2" style="width:100%;">
                    <option value="">-- 按备注搜索 --</option>
                    <option th:each="si : ${systemInfoList}" th:value="${si.remark}" th:text="${si.remark}"></option>
                  </select>
                </div>
                <div class="col-md-1">
                  <button type="submit" class="btn btn-default btn-sm">搜索</button>
                </div>
              </div>
            </form>
            <table class="table table-bordered table-hover">
              <thead>
              <tr>
                <th>序号</th>
                <th>主机(备注)</th>
                <th>日志文件路径</th>
                <th>正则表达式</th>
                <th>启用告警</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="item,stat : ${page.list}">
                <td th:text="${stat.count}"></td>
                <td th:text="${item.hostname} + ' (' + ${hostRemarkMap[item.hostname]} + ')'"></td>
                <td th:text="${item.logFilePath}"></td>
                <td th:text="${item.regexPattern}"></td>
                <td th:text="${item.enableAlert == 1 ? '是' : '否'}"></td>
                <td th:text="${item.state == '1' ? '启用' : '停用'}"></td>
                <td th:text="${#dates.format(item.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                  <a th:href="@{'/logMonitor/edit?id=' + ${item.id}}" class="btn btn-warning btn-xs">编辑</a>
                  <a th:href="@{'/logMonitor/toggle?id=' + ${item.id}}" class="btn btn-info btn-xs">切换</a>
                  <a th:href="@{'/logMonitor/del?id=' + ${item.id}}" class="btn btn-danger btn-xs" onclick="return confirm('确认删除?')">删除</a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(page.list)}">
                <td colspan="8" style="text-align:center;">暂无数据</td>
              </tr>
              </tbody>
            </table>
            <div th:replace="common/page.html"></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div th:replace="common/footer.html"></div>
</div>
</body>
</html>
