<!DOCTYPE html>
<html>
<head>
  <div  th:replace="common/header.html"></div>
  <script type="text/javascript" th:src="@{'/static/common/md5.js'}"></script>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div th:replace="common/chart.html"></div>

<div class="wrapper">

  <div th:replace="common/navbar.html"></div>

  <div th:replace="common/aside.html"></div>

  <div class="content-wrapper" style="font-size: 0.9rem">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1></h1>
          </div>
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item active"></li>
            </ol>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">

  <div class="col-md-6">
    <div class="card card-primary">
      <div class="card-header">
        <h3 class="card-title">修改密码</h3>
      </div>
        <form role="form" id="form1" method="post" th:action="@{'/settings/savePwd'}" onsubmit="return submitPwd()">
            <div class="card-body">
                <div class="form-group">
                  <label for="currentPwd">原密码</label>
                  <input type="password" class="form-control" id="currentPwd" name="currentPwd" placeholder="输入原密码">
                </div>
                <div class="form-group">
                  <label for="newPwd">新密码</label>
                  <input type="password" class="form-control" id="newPwd" name="newPwd" placeholder="输入新密码">
                </div>
                <div class="form-group">
                  <label for="confirmPwd">确认新密码</label>
                  <input type="password" class="form-control" id="confirmPwd" placeholder="再次输入新密码">
                </div>
            </div>
            <div class="card-footer">
              <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
  </div>

        </div>
      </div>
    </section>
  </div>
  <div th:replace="common/footer.html"></div>

</div>

<div th:if="${msg != null and msg != ''}" th:attr="style='position:fixed;top:10px;right:10px;z-index:9999;padding:10px 20px;border-radius:4px;color:#fff;background:' + (${#strings.contains(msg,'成功')} ? '#28a745' : '#dc3545')" th:text="${msg}">
</div>
<script th:if="${msg != null and msg != ''}">
setTimeout(function(){var e=document.querySelector('[style*="position:fixed"]');if(e)e.remove()},3000);
</script>

<script>
function submitPwd() {
    var currentPwd = document.getElementById('currentPwd').value;
    var newPwd = document.getElementById('newPwd').value;
    var confirmPwd = document.getElementById('confirmPwd').value;
    if (!currentPwd || !newPwd || !confirmPwd) {
        alert('请填写完整');
        return false;
    }
    if (newPwd != confirmPwd) {
        alert('两次密码不一致');
        return false;
    }
    if (newPwd.length < 6) {
        alert('密码长度不能少于6位');
        return false;
    }
    document.getElementById('currentPwd').value = hex_md5(currentPwd);
    document.getElementById('newPwd').value = hex_md5(newPwd);
    return true;
}
</script>
</body>
</html>
