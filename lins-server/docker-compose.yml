version: '3.8'
services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lins
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - /data/linscloud/mysql:/var/lib/mysql
      - /data/linscloud/server/lins.sql:/docker-entrypoint-initdb.d/lins.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    container_name: lins-server
    image: ghcr.io/linwen607/lins-server:latest
    ports:
      - "9999:9999"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /data/linscloud/lins-server/logs:/app/log
      - /etc/localtime:/etc/localtime:ro
      - /data/linscloud/lins-server/config:/app/config
    depends_on:
      mysql:
        condition: service_healthy
